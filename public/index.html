<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAI Model — 활용컷 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e2e;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header span { font-size: 1.6rem; }
    .api-btn {
      margin-left: auto;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a0a0c0;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .api-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .api-status { width: 8px; height: 8px; border-radius: 50%; background: #444; }
    .api-status.ok { background: #4ade80; }

    /* ─── Layout ─── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 73px);
    }

    /* ─── Left Panel ─── */
    .left-panel {
      padding: 24px;
      border-right: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6060a0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* ─── Upload Area ─── */
    .upload-area {
      border: 2px dashed #2e2e46;
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #13131f;
      position: relative;
      min-height: 140px;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: #7c6af7;
      background: #16162a;
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .upload-text { color: #7070a0; font-size: 0.9rem; line-height: 1.5; }
    .upload-text strong { color: #a0a0d0; display: block; margin-bottom: 4px; }

    /* 미리보기 (이미지 있을 때) */
    #uploadPreview {
      display: none;
      position: relative;
    }
    #uploadPreview img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }
    .upload-area.has-image {
      padding: 0;
      overflow: hidden;
      cursor: default;
      border-style: solid;
      border-color: #3a3a5a;
    }
    .upload-area.has-image:hover { border-color: #5a5a8a; background: #13131f; }

    /* 오버레이 버튼들 */
    .preview-actions {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #uploadPreview:hover .preview-actions { display: flex; }
    .preview-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .preview-btn:hover { background: rgba(255,255,255,0.28); }
    .preview-btn.danger:hover { background: rgba(239,68,68,0.6); }

    #fileInput { display: none; }

    /* Shot Selector */
    .shot-list { display: flex; flex-direction: column; gap: 8px; }
    .shot-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #13131f;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .shot-item:hover { background: #1a1a2e; }
    .shot-item.selected { background: #1e1830; outline: 1px solid #5040c0; }
    .shot-check {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 2px solid #3a3a5a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .shot-item.selected .shot-check { background: #7c6af7; border-color: #7c6af7; }
    .shot-check::after { content: '✓'; color: white; font-size: 11px; display: none; }
    .shot-item.selected .shot-check::after { display: block; }
    .shot-emoji { font-size: 1.2rem; }
    .shot-info .shot-name { font-size: 0.9rem; font-weight: 600; }
    .shot-info .shot-desc { font-size: 0.75rem; color: #6060a0; margin-top: 2px; }

    .select-all-btn {
      background: none; border: none; color: #6060a0;
      font-size: 0.78rem; cursor: pointer; text-align: left; padding: 0;
      text-decoration: underline;
    }
    .select-all-btn:hover { color: #a0a0c0; }

    /* Generate Button */
    .generate-btn {
      background: linear-gradient(135deg, #7c6af7, #6055e0);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: auto;
    }
    .generate-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,247,0.35); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── Right Panel ─── */
    .right-panel { padding: 24px; overflow-y: auto; }

    .status-bar {
      background: #13131f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #7070a0;
      display: none;
    }
    .status-bar.visible { display: flex; align-items: center; gap: 8px; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #3a3a5a;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-title { font-size: 1rem; font-weight: 600; color: #a0a0c0; }
    .header-actions { display: flex; gap: 8px; }
    .download-all-btn, .clear-history-btn {
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a0a0c0;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .download-all-btn:hover, .clear-history-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .download-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .clear-history-btn:hover { border-color: #f87171; color: #f87171; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* Result Card */
    .result-card {
      background: #13131f;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .result-card.is-history { border-color: #2a2a3e; opacity: 0.85; }
    .result-card:hover { transform: translateY(-2px); }

    .card-image {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #0d0d18;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-image.loading::after {
      content: '';
      width: 32px; height: 32px;
      border: 3px solid #2a2a3e;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .card-image.error-state { flex-direction: column; gap: 8px; }
    .card-image.error-state .err-icon { font-size: 2rem; }
    .card-image.error-state .err-msg { font-size: 0.75rem; color: #f87171; text-align: center; padding: 0 12px; }

    /* 히스토리 날짜 배지 */
    .history-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.6);
      color: #a0a0c0;
      font-size: 0.68rem;
      padding: 3px 7px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    .card-info {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-name { font-size: 0.88rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .card-actions { display: flex; gap: 6px; }
    .icon-btn {
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a0a0c0;
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .icon-btn:disabled { opacity: 0.3; cursor: default; }

    /* Empty state */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: #3a3a5a;
    }
    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }

    /* ─── API Key Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #16162a;
      border: 1px solid #2e2e42;
      border-radius: 16px;
      padding: 28px;
      width: 440px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 8px; }
    .modal p { font-size: 0.85rem; color: #6060a0; margin-bottom: 20px; line-height: 1.5; }
    .modal input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2e2e42;
      color: #e8e8f0;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      font-family: monospace;
    }
    .modal input:focus { outline: none; border-color: #7c6af7; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: none; border: 1px solid #2e2e42;
      color: #6060a0; padding: 9px 18px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem;
    }
    .btn-save {
      background: #7c6af7; border: none;
      color: white; padding: 9px 18px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
    }
    .modal a { color: #7c6af7; text-decoration: none; }
    .modal a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <span>✨</span>
  <h1>GAI Model — 활용컷 생성기</h1>
  <button class="api-btn" onclick="openApiModal()">
    <div class="api-status" id="apiStatus"></div>
    Gemini API 키
  </button>
</header>

<!-- Main -->
<main>
  <!-- Left Panel -->
  <div class="left-panel">

    <!-- 1. 이미지 업로드 -->
    <div>
      <div class="section-label">1. 인물 사진 업로드</div>
      <div class="upload-area" id="uploadArea" onclick="onUploadAreaClick()">
        <!-- 플레이스홀더 -->
        <div id="uploadPlaceholder">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text">
            <strong>클릭하거나 파일을 드래그</strong>
            JPG, PNG, WEBP · 최대 20MB
          </div>
        </div>
        <!-- 미리보기 -->
        <div id="uploadPreview">
          <img id="previewImg" alt="업로드된 이미지" />
          <div class="preview-actions">
            <button class="preview-btn" onclick="triggerUpload(event)">🔄 변경</button>
            <button class="preview-btn danger" onclick="clearUpload(event)">✕ 삭제</button>
          </div>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)" />
    </div>

    <!-- 2. 활용컷 선택 -->
    <div>
      <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
        2. 생성할 활용컷 선택
        <button class="select-all-btn" onclick="toggleAll()">전체 선택/해제</button>
      </div>
      <div class="shot-list" id="shotList"></div>
    </div>

    <!-- 3. 생성 버튼 -->
    <button class="generate-btn" id="generateBtn" onclick="startGenerate()" disabled>
      <span>✨</span> 활용컷 생성하기
    </button>

  </div>

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusText">처리 중...</span>
    </div>

    <!-- Results Header -->
    <div class="results-header">
      <div class="results-title">생성 결과 <span id="resultCount" style="color:#4a4a6a;font-weight:400;"></span></div>
      <div class="header-actions">
        <button class="clear-history-btn" id="clearHistoryBtn" onclick="clearHistory()" style="display:none">🗑 히스토리 삭제</button>
        <button class="download-all-btn" id="downloadAllBtn" onclick="downloadAll()" disabled>⬇ 전체 다운로드</button>
      </div>
    </div>

    <!-- Results Grid -->
    <div class="results-grid" id="resultsGrid">
      <div class="empty-state">
        <div class="empty-icon">🎭</div>
        <p>인물 사진을 업로드하고<br>활용컷을 선택한 뒤 생성하면<br>여기에 결과가 나타납니다.</p>
      </div>
    </div>

  </div>
</main>

<!-- API Key Modal -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h2>🔑 Gemini API 키 설정</h2>
    <p>
      nano-banana MCP가 사용하는 Gemini API 키를 입력해주세요.<br>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>에서 무료로 발급받을 수 있어요.
      키는 브라우저에만 저장되고 외부로 전송되지 않습니다.
    </p>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeApiModal()">취소</button>
      <button class="btn-save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<script>
  // ─── State ───
  let uploadedFilename = null;
  let selectedShots = new Set();
  let generatedImages = [];   // 현재 세션
  let isGenerating = false;
  const SHOT_DEFS = [];
  const HISTORY_KEY = 'gai_history';

  // ─── Init ───
  async function init() {
    await loadShots();
    loadApiKey();
    setupDragDrop();
    loadHistory();
    updateGenerateBtn();
  }

  async function loadShots() {
    const res = await fetch('/api/shots');
    const shots = await res.json();
    shots.forEach(s => { SHOT_DEFS.push(s); selectedShots.add(s.id); });
    renderShotList();
  }

  function renderShotList() {
    document.getElementById('shotList').innerHTML = SHOT_DEFS.map(s => `
      <div class="shot-item ${selectedShots.has(s.id) ? 'selected' : ''}" onclick="toggleShot('${s.id}')">
        <div class="shot-check"></div>
        <div class="shot-emoji">${s.emoji}</div>
        <div class="shot-info">
          <div class="shot-name">${s.name}</div>
          <div class="shot-desc">${s.desc}</div>
        </div>
      </div>
    `).join('');
  }

  function toggleShot(id) {
    selectedShots.has(id) ? selectedShots.delete(id) : selectedShots.add(id);
    renderShotList();
    updateGenerateBtn();
  }

  function toggleAll() {
    if (selectedShots.size === SHOT_DEFS.length) selectedShots.clear();
    else SHOT_DEFS.forEach(s => selectedShots.add(s.id));
    renderShotList();
    updateGenerateBtn();
  }

  // ─── API Key ───
  function loadApiKey() {
    updateApiStatus(!!localStorage.getItem('gemini_api_key'));
  }

  function openApiModal() {
    document.getElementById('apiKeyInput').value = localStorage.getItem('gemini_api_key') || '';
    document.getElementById('apiModal').classList.add('open');
    setTimeout(() => document.getElementById('apiKeyInput').focus(), 100);
  }

  function closeApiModal() {
    document.getElementById('apiModal').classList.remove('open');
  }

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    key ? localStorage.setItem('gemini_api_key', key) : localStorage.removeItem('gemini_api_key');
    updateApiStatus(!!key);
    closeApiModal();
    updateGenerateBtn();
  }

  function updateApiStatus(ok) {
    document.getElementById('apiStatus').className = `api-status ${ok ? 'ok' : ''}`;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeApiModal(); });

  // ─── Upload ───
  function onUploadAreaClick() {
    if (!uploadedFilename) triggerUpload();
  }

  function triggerUpload(e) {
    if (e) e.stopPropagation();
    document.getElementById('fileInput').click();
  }

  function clearUpload(e) {
    if (e) e.stopPropagation();
    uploadedFilename = null;
    document.getElementById('previewImg').src = '';
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('uploadPlaceholder').style.display = '';
    const area = document.getElementById('uploadArea');
    area.classList.remove('has-image');
    updateGenerateBtn();
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) uploadFile(file);
    // input 초기화 (같은 파일 재선택 허용)
    e.target.value = '';
  }

  function setupDragDrop() {
    const area = document.getElementById('uploadArea');
    area.addEventListener('dragover', e => {
      e.preventDefault();
      area.classList.add('drag-over');
    });
    area.addEventListener('dragleave', e => {
      if (!area.contains(e.relatedTarget)) area.classList.remove('drag-over');
    });
    area.addEventListener('drop', e => {
      e.preventDefault();
      area.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) uploadFile(file);
    });
  }

  async function uploadFile(file) {
    const placeholder = document.getElementById('uploadPlaceholder');
    placeholder.innerHTML = '<div class="upload-icon">⏳</div><div class="upload-text">업로드 중...</div>';

    const formData = new FormData();
    formData.append('image', file);

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.filename) {
        uploadedFilename = data.filename;
        document.getElementById('previewImg').src = data.url;
        document.getElementById('uploadPreview').style.display = 'block';
        placeholder.style.display = 'none';
        document.getElementById('uploadArea').classList.add('has-image');
        updateGenerateBtn();
      }
    } catch (err) {
      placeholder.innerHTML = '<div class="upload-icon">❌</div><div class="upload-text">업로드 실패. 다시 시도해주세요.</div>';
    }
  }

  // ─── History ───
  function saveToHistory(imgData) {
    const history = getHistory();
    // 동일 파일명이면 덮어쓰기
    const idx = history.findIndex(h => h.filename === imgData.filename);
    const entry = { ...imgData, savedAt: new Date().toISOString() };
    if (idx >= 0) history[idx] = entry;
    else history.unshift(entry);
    // 최대 100개 유지
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 100)));
    document.getElementById('clearHistoryBtn').style.display = '';
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
  }

  function loadHistory() {
    const history = getHistory();
    if (history.length === 0) return;

    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';
    document.getElementById('clearHistoryBtn').style.display = '';

    history.forEach(item => {
      const card = createHistoryCard(item);
      grid.appendChild(card);
    });
    updateResultCount();
  }

  function createHistoryCard(item) {
    const card = document.createElement('div');
    card.className = 'result-card is-history';
    card.id = `card-${item.shotId}-${item.filename}`;
    const date = new Date(item.savedAt).toLocaleDateString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    card.innerHTML = `
      <div class="card-image" id="cardImg-hist-${item.filename}">
        <img src="${item.url}" alt="${item.name}" loading="lazy"
             onclick="openImage('${item.url}')" style="cursor:zoom-in"
             onerror="this.closest('.card-image').innerHTML='<div class=\\'err-icon\\'>🗂</div><div class=\\'err-msg\\'>파일 없음</div>'; this.closest('.card-image').className='card-image error-state';" />
        <div class="history-badge">${date}</div>
      </div>
      <div class="card-info">
        <div class="card-name">${item.emoji} ${item.name}</div>
        <div class="card-actions">
          <button class="icon-btn" onclick="regenShot('${item.shotId}')" title="다시 생성">🔄</button>
          <button class="icon-btn" onclick="downloadImage('${item.url}','${item.filename}')" title="다운로드">⬇</button>
          <button class="icon-btn" onclick="deleteHistoryCard('${item.filename}')" title="삭제">🗑</button>
        </div>
      </div>
    `;
    return card;
  }

  function clearHistory() {
    if (!confirm('히스토리를 모두 삭제할까요?\n(서버 파일은 삭제되지 않습니다)')) return;
    localStorage.removeItem(HISTORY_KEY);
    document.getElementById('clearHistoryBtn').style.display = 'none';
    // 히스토리 카드만 제거 (현재 세션 카드는 유지)
    document.querySelectorAll('.result-card.is-history').forEach(c => c.remove());
    if (!document.querySelector('.result-card')) {
      document.getElementById('resultsGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎭</div>
          <p>인물 사진을 업로드하고<br>활용컷을 선택한 뒤 생성하면<br>여기에 결과가 나타납니다.</p>
        </div>`;
    }
    updateResultCount();
  }

  function deleteHistoryCard(filename) {
    if (!confirm('이 항목을 히스토리에서 삭제할까요?')) return;
    // localStorage에서 제거
    const history = getHistory().filter(h => h.filename !== filename);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    // 카드 제거
    document.querySelectorAll('.result-card').forEach(c => {
      if (c.id.includes(filename)) c.remove();
    });
    generatedImages = generatedImages.filter(i => i.filename !== filename);
    if (history.length === 0) document.getElementById('clearHistoryBtn').style.display = 'none';
    updateResultCount();
  }

  // ─── Generate ───
  function updateGenerateBtn() {
    const btn = document.getElementById('generateBtn');
    const hasImage = !!uploadedFilename;
    const hasShots = selectedShots.size > 0;
    const hasKey = !!localStorage.getItem('gemini_api_key');
    btn.disabled = !hasImage || !hasShots || !hasKey || isGenerating;

    if (!hasKey) btn.innerHTML = '<span>⚠️</span> API 키를 먼저 설정해주세요';
    else if (!hasImage) btn.innerHTML = '<span>🖼️</span> 사진을 먼저 업로드해주세요';
    else if (!hasShots) btn.innerHTML = '<span>☑️</span> 활용컷을 하나 이상 선택해주세요';
    else btn.innerHTML = `<span>✨</span> 활용컷 생성하기 (${selectedShots.size}개)`;
  }

  async function startGenerate() {
    if (isGenerating) return;
    isGenerating = true;
    updateGenerateBtn();

    const apiKey = localStorage.getItem('gemini_api_key');
    const grid = document.getElementById('resultsGrid');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');

    // 새 카드 플레이스홀더를 그리드 맨 앞에 삽입
    const emptyState = grid.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    const placeholders = [];
    selectedShots.forEach(id => {
      const shot = SHOT_DEFS.find(s => s.id === id);
      if (shot) {
        const card = createLoadingCard(shot);
        grid.insertBefore(card, grid.firstChild);
        placeholders.push(shot);
      }
    });

    statusBar.classList.add('visible');
    statusText.textContent = `${placeholders.length}개 활용컷 생성 시작...`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: uploadedFilename, apiKey, selectedShots: [...selectedShots] }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { handleEvent(JSON.parse(line.slice(6)), statusText); } catch {}
          }
        }
      }
    } catch (err) {
      statusText.textContent = `오류: ${err.message}`;
    } finally {
      isGenerating = false;
      updateGenerateBtn();
      setTimeout(() => statusBar.classList.remove('visible'), 3000);
      updateResultCount();
    }
  }

  function handleEvent(event, statusText) {
    switch (event.type) {
      case 'status':
        statusText.textContent = event.message;
        break;
      case 'progress':
        statusText.textContent = `${event.emoji} ${event.name} 생성 중...`;
        updateCard(event.shotId, 'loading');
        break;
      case 'done':
        statusText.textContent = `${event.emoji} ${event.name} 완료!`;
        generatedImages.push(event);
        updateCard(event.shotId, 'done', event.url, event.filename);
        saveToHistory(event);
        document.getElementById('downloadAllBtn').disabled = false;
        break;
      case 'error':
        updateCard(event.shotId, 'error', null, null, event.message);
        break;
      case 'complete':
        statusText.textContent = `✅ 완료! ${generatedImages.length}개 생성됨`;
        break;
      case 'fatal':
        statusText.textContent = `❌ 오류: ${event.message}`;
        break;
    }
  }

  function createLoadingCard(shot) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = `card-${shot.id}`;
    card.innerHTML = `
      <div class="card-image loading" id="cardImg-${shot.id}"></div>
      <div class="card-info">
        <div class="card-name">${shot.emoji} ${shot.name}</div>
        <div class="card-actions">
          <button class="icon-btn" id="regenBtn-${shot.id}" disabled title="다시 생성">🔄</button>
          <button class="icon-btn" disabled title="다운로드">⬇</button>
          <button class="icon-btn" disabled title="삭제">🗑</button>
        </div>
      </div>
    `;
    return card;
  }

  function updateCard(shotId, state, url, filename, errMsg) {
    const imgDiv = document.getElementById(`cardImg-${shotId}`);
    const card = document.getElementById(`card-${shotId}`);
    if (!imgDiv || !card) return;

    const [regenBtn, dlBtn, delBtn] = card.querySelectorAll('.icon-btn');

    if (state === 'loading') {
      imgDiv.className = 'card-image loading';
      imgDiv.innerHTML = '';
      [regenBtn, dlBtn, delBtn].forEach(b => b && (b.disabled = true));
    } else if (state === 'done') {
      imgDiv.className = 'card-image';
      imgDiv.innerHTML = `<img src="${url}" alt="생성된 이미지" loading="lazy" onclick="openImage('${url}')" style="cursor:zoom-in" />`;
      regenBtn.disabled = false; regenBtn.onclick = () => regenShot(shotId);
      dlBtn.disabled = false;    dlBtn.onclick = () => downloadImage(url, filename);
      delBtn.disabled = false;   delBtn.onclick = () => deleteSessionCard(shotId, filename);
    } else if (state === 'error') {
      imgDiv.className = 'card-image error-state';
      imgDiv.innerHTML = `<div class="err-icon">⚠️</div><div class="err-msg">${errMsg || '생성 실패'}</div>`;
      regenBtn.disabled = false; regenBtn.onclick = () => regenShot(shotId);
      dlBtn.disabled = true;
      delBtn.disabled = false;   delBtn.onclick = () => { card.remove(); updateResultCount(); };
    }
  }

  // ─── 개별 재생성 ───
  async function regenShot(shotId) {
    if (!uploadedFilename) return alert('업로드된 이미지가 없습니다.');
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) return alert('API 키를 먼저 설정해주세요.');

    const shot = SHOT_DEFS.find(s => s.id === shotId);
    if (!shot) return;

    // 기존 세션 카드가 없으면 새로 만들어 맨 앞에 삽입
    let card = document.getElementById(`card-${shotId}`);
    if (!card) {
      card = createLoadingCard(shot);
      const grid = document.getElementById('resultsGrid');
      const emptyState = grid.querySelector('.empty-state');
      if (emptyState) emptyState.remove();
      grid.insertBefore(card, grid.firstChild);
    }

    generatedImages = generatedImages.filter(i => i.shotId !== shotId);
    updateCard(shotId, 'loading');

    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    statusBar.classList.add('visible');
    statusText.textContent = `${shot.emoji} ${shot.name} 재생성 중...`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: uploadedFilename, apiKey, selectedShots: [shotId] }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { handleEvent(JSON.parse(line.slice(6)), statusText); } catch {}
          }
        }
      }
    } catch (err) {
      statusText.textContent = `❌ 오류: ${err.message}`;
      updateCard(shotId, 'error', null, null, err.message);
    } finally {
      setTimeout(() => statusBar.classList.remove('visible'), 3000);
      updateResultCount();
    }
  }

  // ─── Actions ───
  function downloadImage(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'generated.png';
    a.click();
  }

  async function downloadAll() {
    const allImages = [...document.querySelectorAll('.card-image img')];
    for (const img of allImages) {
      const src = img.getAttribute('src');
      const filename = src.split('/').pop();
      downloadImage(src, filename);
      await new Promise(r => setTimeout(r, 300));
    }
  }

  function deleteSessionCard(shotId, filename) {
    if (!confirm('이 이미지를 삭제할까요?')) return;
    fetch(`/api/generated/${filename}`, { method: 'DELETE' }).catch(() => {});
    const card = document.getElementById(`card-${shotId}`);
    if (card) card.remove();
    generatedImages = generatedImages.filter(i => i.filename !== filename);
    // 히스토리에서도 제거
    const history = getHistory().filter(h => h.filename !== filename);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    updateResultCount();
  }

  function openImage(url) { window.open(url, '_blank'); }

  function updateResultCount() {
    const cards = document.querySelectorAll('.result-card').length;
    document.getElementById('resultCount').textContent = cards > 0 ? `(${cards})` : '';
    if (generatedImages.length > 0 || document.querySelectorAll('.card-image img').length > 0) {
      document.getElementById('downloadAllBtn').disabled = false;
    }
  }

  // ─── Start ───
  init();
</script>
</body>
</html>
