<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAI Model — 활용컷 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e2e;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header span { font-size: 1.6rem; }
    .api-btn {
      margin-left: auto;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a0a0c0;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .api-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .api-status { width: 8px; height: 8px; border-radius: 50%; background: #444; }
    .api-status.ok { background: #4ade80; }

    /* ─── Layout ─── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 73px);
    }

    /* ─── Left Panel ─── */
    .left-panel {
      padding: 24px;
      border-right: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6060a0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* ─── Upload Area ─── */
    .upload-area {
      border: 2px dashed #2e2e46;
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #13131f;
      position: relative;
      min-height: 110px;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: #7c6af7;
      background: #16162a;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { color: #7070a0; font-size: 0.85rem; line-height: 1.5; }
    .upload-text strong { color: #a0a0d0; display: block; margin-bottom: 2px; }
    .upload-inner { pointer-events: none; }

    #fileInput { display: none; }

    /* ─── Model List ─── */
    .model-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .model-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #13131f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .model-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .model-info {
      flex: 1;
      min-width: 0;
    }
    .model-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #c0c0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .model-order {
      font-size: 0.72rem;
      color: #5050a0;
      margin-top: 1px;
    }
    .model-remove {
      background: none;
      border: none;
      color: #5050a0;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1;
    }
    .model-remove:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* Shot Selector */
    .shot-list { display: flex; flex-direction: column; gap: 8px; }
    .shot-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #13131f;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .shot-item:hover { background: #1a1a2e; }
    .shot-item.selected { background: #1e1830; outline: 1px solid #5040c0; }
    .shot-check {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 2px solid #3a3a5a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .shot-item.selected .shot-check { background: #7c6af7; border-color: #7c6af7; }
    .shot-check::after { content: '✓'; color: white; font-size: 11px; display: none; }
    .shot-item.selected .shot-check::after { display: block; }
    .shot-emoji { font-size: 1.2rem; }
    .shot-info .shot-name { font-size: 0.9rem; font-weight: 600; }
    .shot-info .shot-desc { font-size: 0.75rem; color: #6060a0; margin-top: 2px; }

    .select-all-btn {
      background: none; border: none; color: #6060a0;
      font-size: 0.78rem; cursor: pointer; text-align: left; padding: 0;
      text-decoration: underline;
    }
    .select-all-btn:hover { color: #a0a0c0; }

    /* Generate Button */
    .generate-btn {
      background: linear-gradient(135deg, #7c6af7, #6055e0);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: auto;
    }
    .generate-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,247,0.35); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── Right Panel ─── */
    .right-panel { padding: 24px; overflow-y: auto; }

    .status-bar {
      background: #13131f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #7070a0;
      display: none;
    }
    .status-bar.visible { display: flex; align-items: center; gap: 8px; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #3a3a5a;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-title { font-size: 1rem; font-weight: 600; color: #a0a0c0; }
    .header-actions { display: flex; gap: 8px; }
    .download-all-btn, .clear-history-btn {
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a0a0c0;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .download-all-btn:hover, .clear-history-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .download-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .clear-history-btn:hover { border-color: #f87171; color: #f87171; }

    /* ─── Person Section ─── */
    .person-section {
      margin-bottom: 28px;
    }
    .person-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e1e2e;
    }
    .person-thumb {
      width: 36px; height: 36px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #2e2e42;
    }
    .person-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #7070a0;
    }
    .person-filename {
      font-size: 0.78rem;
      color: #4a4a6a;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .person-dl-btn {
      margin-left: auto;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #7070a0;
      padding: 5px 11px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .person-dl-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .person-dl-btn:disabled { opacity: 0.3; cursor: default; }
    .person-badge {
      font-size: 0.72rem;
      color: #5050a0;
      background: #1a1a2e;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    /* Result Card */
    .result-card {
      background: #13131f;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .result-card.is-history { border-color: #2a2a3e; opacity: 0.85; }
    .result-card:hover { transform: translateY(-2px); }

    .card-image {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #0d0d18;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-image.loading::after {
      content: '';
      width: 32px; height: 32px;
      border: 3px solid #2a2a3e;
      border-top-color: #7c6af7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .card-image.error-state { flex-direction: column; gap: 8px; }
    .card-image.error-state .err-icon { font-size: 2rem; }
    .card-image.error-state .err-msg { font-size: 0.75rem; color: #f87171; text-align: center; padding: 0 12px; }

    /* 히스토리 날짜 배지 */
    .history-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.6);
      color: #a0a0c0;
      font-size: 0.68rem;
      padding: 3px 7px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    .card-info {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-name { font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .card-actions { display: flex; gap: 5px; }
    .icon-btn {
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a0a0c0;
      width: 30px; height: 30px;
      border-radius: 7px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: #2a2a3e; color: #e8e8f0; }
    .icon-btn:disabled { opacity: 0.3; cursor: default; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #3a3a5a;
    }
    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }

    /* ─── API Key Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #16162a;
      border: 1px solid #2e2e42;
      border-radius: 16px;
      padding: 28px;
      width: 440px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 8px; }
    .modal p { font-size: 0.85rem; color: #6060a0; margin-bottom: 20px; line-height: 1.5; }
    .modal input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2e2e42;
      color: #e8e8f0;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      font-family: monospace;
    }
    .modal input:focus { outline: none; border-color: #7c6af7; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: none; border: 1px solid #2e2e42;
      color: #6060a0; padding: 9px 18px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem;
    }
    .btn-save {
      background: #7c6af7; border: none;
      color: white; padding: 9px 18px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
    }
    .modal a { color: #7c6af7; text-decoration: none; }
    .modal a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <span>✨</span>
  <h1>GAI Model — 활용컷 생성기</h1>
  <button class="api-btn" onclick="openApiModal()">
    <div class="api-status" id="apiStatus"></div>
    Gemini API 키
  </button>
</header>

<!-- Main -->
<main>
  <!-- Left Panel -->
  <div class="left-panel">

    <!-- 1. 이미지 업로드 -->
    <div>
      <div class="section-label">1. 인물 사진 업로드</div>
      <div class="upload-area" id="uploadArea" onclick="triggerUpload()">
        <div class="upload-inner">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text">
            <strong>클릭하거나 파일을 드래그</strong>
            여러 장 동시 업로드 가능 · JPG, PNG, WEBP
          </div>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelect(event)" />

      <!-- 업로드된 모델 목록 -->
      <div class="model-list" id="modelList"></div>
    </div>

    <!-- 2. 활용컷 선택 -->
    <div>
      <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
        2. 생성할 활용컷 선택
        <button class="select-all-btn" onclick="toggleAll()">전체 선택/해제</button>
      </div>
      <div class="shot-list" id="shotList"></div>
    </div>

    <!-- 3. 생성 버튼 -->
    <button class="generate-btn" id="generateBtn" onclick="startGenerate()" disabled>
      <span>✨</span> 활용컷 생성하기
    </button>

  </div>

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusText">처리 중...</span>
    </div>

    <!-- Results Header -->
    <div class="results-header">
      <div class="results-title">생성 결과 <span id="resultCount" style="color:#4a4a6a;font-weight:400;"></span></div>
      <div class="header-actions">
        <button class="clear-history-btn" id="clearHistoryBtn" onclick="clearHistory()" style="display:none">🗑 히스토리 삭제</button>
        <button class="download-all-btn" id="downloadAllBtn" onclick="downloadAll()" disabled>⬇ 전체 다운로드</button>
      </div>
    </div>

    <!-- Results Area -->
    <div id="resultsArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎭</div>
        <p>인물 사진을 업로드하고<br>활용컷을 선택한 뒤 생성하면<br>여기에 결과가 나타납니다.</p>
      </div>
    </div>

  </div>
</main>

<!-- API Key Modal -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h2>🔑 Gemini API 키 설정</h2>
    <p>
      Gemini API 키를 입력해주세요.<br>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>에서 무료로 발급받을 수 있어요.
      키는 브라우저에만 저장되고 외부로 전송되지 않습니다.
    </p>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeApiModal()">취소</button>
      <button class="btn-save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<script>
  // ─── State ───
  let uploadedModels = [];   // [{ filename, url, originalName }]
  let selectedShots = new Set();
  let generatedImages = [];
  let isGenerating = false;
  const SHOT_DEFS = [];
  const HISTORY_KEY = 'gai_history_v2';

  // ─── Init ───
  async function init() {
    await loadShots();
    loadApiKey();
    setupDragDrop();
    loadHistory();
    updateGenerateBtn();
  }

  async function loadShots() {
    const res = await fetch('/api/shots');
    const shots = await res.json();
    shots.forEach(s => { SHOT_DEFS.push(s); selectedShots.add(s.id); });
    renderShotList();
  }

  function renderShotList() {
    document.getElementById('shotList').innerHTML = SHOT_DEFS.map(s => `
      <div class="shot-item ${selectedShots.has(s.id) ? 'selected' : ''}" onclick="toggleShot('${s.id}')">
        <div class="shot-check"></div>
        <div class="shot-emoji">${s.emoji}</div>
        <div class="shot-info">
          <div class="shot-name">${s.name}</div>
          <div class="shot-desc">${s.desc}</div>
        </div>
      </div>
    `).join('');
  }

  function toggleShot(id) {
    selectedShots.has(id) ? selectedShots.delete(id) : selectedShots.add(id);
    renderShotList();
    updateGenerateBtn();
  }

  function toggleAll() {
    if (selectedShots.size === SHOT_DEFS.length) selectedShots.clear();
    else SHOT_DEFS.forEach(s => selectedShots.add(s.id));
    renderShotList();
    updateGenerateBtn();
  }

  // ─── API Key ───
  function loadApiKey() {
    updateApiStatus(!!localStorage.getItem('gemini_api_key'));
  }

  function openApiModal() {
    document.getElementById('apiKeyInput').value = localStorage.getItem('gemini_api_key') || '';
    document.getElementById('apiModal').classList.add('open');
    setTimeout(() => document.getElementById('apiKeyInput').focus(), 100);
  }

  function closeApiModal() {
    document.getElementById('apiModal').classList.remove('open');
  }

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    key ? localStorage.setItem('gemini_api_key', key) : localStorage.removeItem('gemini_api_key');
    updateApiStatus(!!key);
    closeApiModal();
    updateGenerateBtn();
  }

  function updateApiStatus(ok) {
    document.getElementById('apiStatus').className = `api-status ${ok ? 'ok' : ''}`;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeApiModal(); });

  // ─── Upload ───
  function triggerUpload(e) {
    if (e) e.stopPropagation();
    document.getElementById('fileInput').click();
  }

  function handleFileSelect(e) {
    const files = Array.from(e.target.files);
    files.forEach(f => uploadFile(f));
    e.target.value = '';
  }

  function setupDragDrop() {
    const area = document.getElementById('uploadArea');
    area.addEventListener('dragover', e => {
      e.preventDefault();
      area.classList.add('drag-over');
    });
    area.addEventListener('dragleave', e => {
      if (!area.contains(e.relatedTarget)) area.classList.remove('drag-over');
    });
    area.addEventListener('drop', e => {
      e.preventDefault();
      area.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      files.forEach(f => uploadFile(f));
    });
  }

  async function uploadFile(file) {
    const formData = new FormData();
    formData.append('image', file);

    // 임시 항목 추가 (업로드 중 표시)
    const tempId = `temp-${Date.now()}-${Math.random()}`;
    const tempItem = document.createElement('div');
    tempItem.className = 'model-item';
    tempItem.id = tempId;
    tempItem.innerHTML = `
      <div style="width:44px;height:44px;border-radius:8px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">⏳</div>
      <div class="model-info">
        <div class="model-name">${file.name}</div>
        <div class="model-order">업로드 중...</div>
      </div>
    `;
    document.getElementById('modelList').appendChild(tempItem);

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.filename) {
        uploadedModels.push({ filename: data.filename, url: data.url, originalName: file.name });
        tempItem.remove();
        renderModelList();
        updateGenerateBtn();
      }
    } catch {
      tempItem.remove();
    }
  }

  function renderModelList() {
    const list = document.getElementById('modelList');
    list.innerHTML = uploadedModels.map((m, i) => `
      <div class="model-item">
        <img class="model-thumb" src="${m.url}" alt="${m.originalName}" />
        <div class="model-info">
          <div class="model-name">${m.originalName}</div>
          <div class="model-order">모델 ${i + 1}</div>
        </div>
        <button class="model-remove" onclick="removeModel('${m.filename}')" title="제거">✕</button>
      </div>
    `).join('');
  }

  function removeModel(filename) {
    uploadedModels = uploadedModels.filter(m => m.filename !== filename);
    renderModelList();
    updateGenerateBtn();
  }

  // ─── History ───
  function saveToHistory(imgData) {
    const history = getHistory();
    const idx = history.findIndex(h => h.filename === imgData.filename && h.shotId === imgData.shotId);
    const entry = { ...imgData, savedAt: new Date().toISOString() };
    if (idx >= 0) history[idx] = entry;
    else history.unshift(entry);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 200)));
    document.getElementById('clearHistoryBtn').style.display = '';
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
  }

  function loadHistory() {
    const history = getHistory();
    if (history.length === 0) return;

    document.getElementById('clearHistoryBtn').style.display = '';

    // 파일명 기준으로 그루핑
    const groups = {};
    const order = [];
    history.forEach(item => {
      if (!groups[item.filename]) {
        groups[item.filename] = [];
        order.push(item.filename);
      }
      groups[item.filename].push(item);
    });

    const area = document.getElementById('resultsArea');
    const emptyState = area.querySelector('#emptyState');
    if (emptyState) emptyState.remove();

    order.forEach(filename => {
      const items = groups[filename];
      const section = getOrCreatePersonSection(filename, items[0].originalName || filename, null, true);
      const grid = section.querySelector('.results-grid');
      items.forEach(item => {
        const card = createHistoryCard(item);
        grid.appendChild(card);
      });
    });

    updateResultCount();
  }

  function getOrCreatePersonSection(filename, label, thumbUrl, isHistory) {
    const sectionId = `person-section-${CSS.escape(filename)}`;
    let section = document.getElementById(sectionId);
    if (section) return section;

    section = document.createElement('div');
    section.className = 'person-section';
    section.id = sectionId;

    const thumbHtml = thumbUrl
      ? `<img class="person-thumb" src="${thumbUrl}" alt="${label}" />`
      : `<div style="width:36px;height:36px;border-radius:8px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">🗂</div>`;

    section.innerHTML = `
      <div class="person-header">
        ${thumbHtml}
        <div>
          <div class="person-label">${label}</div>
          <div class="person-filename">${filename}</div>
        </div>
        <div class="person-badge" id="badge-${CSS.escape(filename)}">0개</div>
        <button class="person-dl-btn" id="person-dl-${CSS.escape(filename)}" onclick="downloadPerson('${filename}')" disabled>⬇ 전체 다운로드</button>
      </div>
      <div class="results-grid" id="grid-${CSS.escape(filename)}"></div>
    `;

    document.getElementById('resultsArea').appendChild(section);
    return section;
  }

  function createHistoryCard(item) {
    const card = document.createElement('div');
    card.className = 'result-card is-history';
    card.id = `card-${CSS.escape(item.filename)}-${item.shotId}`;
    const date = new Date(item.savedAt).toLocaleDateString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    card.innerHTML = `
      <div class="card-image">
        <img src="${item.url}" alt="${item.name}" loading="lazy"
             onclick="openImage('${item.url}')" style="cursor:zoom-in"
             onerror="this.closest('.card-image').innerHTML='<div class=\\'err-icon\\'>🗂</div><div class=\\'err-msg\\'>파일 없음</div>'; this.closest('.card-image').className='card-image error-state';" />
        <div class="history-badge">${date}</div>
      </div>
      <div class="card-info">
        <div class="card-name">${item.emoji} ${item.name}</div>
        <div class="card-actions">
          <button class="icon-btn" onclick="regenShot('${item.filename}','${item.shotId}')" title="다시 생성">🔄</button>
          <button class="icon-btn" onclick="downloadImage('${item.url}','${item.outputFilename || item.filename}')" title="다운로드">⬇</button>
          <button class="icon-btn" onclick="deleteCard('${CSS.escape(item.filename)}','${item.shotId}','${item.outputFilename || ''}')" title="삭제">🗑</button>
        </div>
      </div>
    `;
    return card;
  }

  function clearHistory() {
    const hasLoading = !!document.querySelector('.card-image.loading');
    const msg = hasLoading
      ? '생성 중인 이미지는 유지하고\n나머지 히스토리를 모두 삭제할까요?'
      : '히스토리를 모두 삭제할까요?\n(서버 파일은 삭제되지 않습니다)';
    if (!confirm(msg)) return;

    localStorage.removeItem(HISTORY_KEY);
    generatedImages = [];

    document.querySelectorAll('.result-card').forEach(card => {
      if (!card.querySelector('.card-image.loading')) card.remove();
    });

    // 빈 섹션 제거
    document.querySelectorAll('.person-section').forEach(sec => {
      if (!sec.querySelector('.result-card')) sec.remove();
    });

    document.getElementById('clearHistoryBtn').style.display = 'none';

    if (!document.querySelector('.result-card')) {
      const area = document.getElementById('resultsArea');
      if (!area.querySelector('#emptyState')) {
        area.innerHTML = `
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">🎭</div>
            <p>인물 사진을 업로드하고<br>활용컷을 선택한 뒤 생성하면<br>여기에 결과가 나타납니다.</p>
          </div>`;
      }
    }
    updateResultCount();
  }

  function deleteCard(escapedFilename, shotId, outputFilename) {
    if (!confirm('이 이미지를 삭제할까요?')) return;
    if (outputFilename) fetch(`/api/generated/${outputFilename}`, { method: 'DELETE' }).catch(() => {});
    const card = document.getElementById(`card-${escapedFilename}-${shotId}`);
    if (card) card.remove();
    // 히스토리에서도 제거
    const history = getHistory().filter(h => !(CSS.escape(h.filename) === escapedFilename && h.shotId === shotId));
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    generatedImages = generatedImages.filter(i => !(CSS.escape(i.filename) === escapedFilename && i.shotId === shotId));
    // 섹션이 비면 섹션도 제거
    const section = document.querySelector(`[id="person-section-${escapedFilename}"]`);
    if (section && !section.querySelector('.result-card')) section.remove();
    updateResultCount();
  }

  // ─── Generate ───
  function updateGenerateBtn() {
    const btn = document.getElementById('generateBtn');
    const hasImages = uploadedModels.length > 0;
    const hasShots = selectedShots.size > 0;
    const hasKey = !!localStorage.getItem('gemini_api_key');
    btn.disabled = !hasImages || !hasShots || !hasKey || isGenerating;

    if (!hasKey) btn.innerHTML = '<span>⚠️</span> API 키를 먼저 설정해주세요';
    else if (!hasImages) btn.innerHTML = '<span>🖼️</span> 사진을 먼저 업로드해주세요';
    else if (!hasShots) btn.innerHTML = '<span>☑️</span> 활용컷을 하나 이상 선택해주세요';
    else {
      const total = uploadedModels.length * selectedShots.size;
      btn.innerHTML = `<span>✨</span> 활용컷 생성하기 (${uploadedModels.length}명 × ${selectedShots.size}개 = ${total}장)`;
    }
  }

  async function startGenerate() {
    if (isGenerating) return;
    isGenerating = true;
    updateGenerateBtn();

    const apiKey = localStorage.getItem('gemini_api_key');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');

    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();

    statusBar.classList.add('visible');
    statusText.textContent = '생성 시작...';

    // 각 모델별 섹션 및 로딩 카드 생성
    uploadedModels.forEach(model => {
      const section = getOrCreatePersonSection(model.filename, model.originalName, model.url, false);
      const grid = section.querySelector('.results-grid');
      [...selectedShots].forEach(shotId => {
        const shot = SHOT_DEFS.find(s => s.id === shotId);
        if (!shot) return;
        const cardId = `card-${CSS.escape(model.filename)}-${shotId}`;
        let card = document.getElementById(cardId);
        if (card) {
          // 기존 카드 초기화
          const imgDiv = card.querySelector('.card-image');
          if (imgDiv) { imgDiv.className = 'card-image loading'; imgDiv.innerHTML = ''; }
          card.querySelectorAll('.icon-btn').forEach(b => b.disabled = true);
        } else {
          card = createLoadingCard(model.filename, shot);
          grid.appendChild(card);
        }
      });
    });

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filenames: uploadedModels.map(m => m.filename),
          apiKey,
          selectedShots: [...selectedShots],
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { handleEvent(JSON.parse(line.slice(6)), statusText); } catch {}
          }
        }
      }
    } catch (err) {
      statusText.textContent = `오류: ${err.message}`;
    } finally {
      isGenerating = false;
      updateGenerateBtn();
      setTimeout(() => statusBar.classList.remove('visible'), 3000);
      updateResultCount();
    }
  }

  function handleEvent(event, statusText) {
    switch (event.type) {
      case 'person_start':
        statusText.textContent = `👤 ${event.filename} 처리 중... (${event.personIndex + 1}/${event.totalPersons})`;
        break;
      case 'person_done':
        statusText.textContent = `✅ ${event.filename} 완료!`;
        updatePersonBadge(event.filename);
        break;
      case 'progress':
        statusText.textContent = `${event.emoji} ${event.name} 생성 중... (${event.filename})`;
        break;
      case 'done': {
        statusText.textContent = `${event.emoji} ${event.name} 완료!`;
        generatedImages.push(event);
        updateCard(event.filename, event.shotId, 'done', event.url, event.outputFilename);
        saveToHistory({ ...event, originalName: getOriginalName(event.filename) });
        document.getElementById('downloadAllBtn').disabled = false;
        updatePersonBadge(event.filename);
        break;
      }
      case 'error':
        updateCard(event.filename, event.shotId, 'error', null, null, event.message);
        break;
      case 'complete':
        statusText.textContent = `✅ 완료! 총 ${generatedImages.length}개 생성됨`;
        break;
      case 'fatal':
        statusText.textContent = `❌ 오류: ${event.message}`;
        break;
    }
  }

  function getOriginalName(filename) {
    const model = uploadedModels.find(m => m.filename === filename);
    return model ? model.originalName : filename;
  }

  function updatePersonBadge(filename) {
    const ef = CSS.escape(filename);
    const section = document.getElementById(`person-section-${ef}`);
    if (!section) return;
    const count = section.querySelectorAll('.card-image img').length;
    const badgeEl = document.getElementById(`badge-${ef}`);
    if (badgeEl) badgeEl.textContent = `${count}개`;
    const dlBtn = document.getElementById(`person-dl-${ef}`);
    if (dlBtn) dlBtn.disabled = count === 0;
  }

  function createLoadingCard(filename, shot) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = `card-${CSS.escape(filename)}-${shot.id}`;
    card.innerHTML = `
      <div class="card-image loading" id="cardImg-${CSS.escape(filename)}-${shot.id}"></div>
      <div class="card-info">
        <div class="card-name">${shot.emoji} ${shot.name}</div>
        <div class="card-actions">
          <button class="icon-btn" disabled title="다시 생성">🔄</button>
          <button class="icon-btn" disabled title="다운로드">⬇</button>
          <button class="icon-btn" disabled title="삭제">🗑</button>
        </div>
      </div>
    `;
    return card;
  }

  function updateCard(filename, shotId, state, url, outputFilename, errMsg) {
    const ef = CSS.escape(filename);
    const imgDiv = document.getElementById(`cardImg-${ef}-${shotId}`);
    const card = document.getElementById(`card-${ef}-${shotId}`);
    if (!imgDiv || !card) return;

    const [regenBtn, dlBtn, delBtn] = card.querySelectorAll('.icon-btn');

    if (state === 'loading') {
      imgDiv.className = 'card-image loading';
      imgDiv.innerHTML = '';
      [regenBtn, dlBtn, delBtn].forEach(b => b && (b.disabled = true));
    } else if (state === 'done') {
      imgDiv.className = 'card-image';
      imgDiv.innerHTML = `<img src="${url}" alt="생성된 이미지" loading="lazy" onclick="openImage('${url}')" style="cursor:zoom-in" />`;
      regenBtn.disabled = false; regenBtn.onclick = () => regenShot(filename, shotId);
      dlBtn.disabled = false;    dlBtn.onclick = () => downloadImage(url, outputFilename);
      delBtn.disabled = false;   delBtn.onclick = () => deleteCard(ef, shotId, outputFilename);
    } else if (state === 'error') {
      imgDiv.className = 'card-image error-state';
      imgDiv.innerHTML = `<div class="err-icon">⚠️</div><div class="err-msg">${errMsg || '생성 실패'}</div>`;
      regenBtn.disabled = false; regenBtn.onclick = () => regenShot(filename, shotId);
      dlBtn.disabled = true;
      delBtn.disabled = false;   delBtn.onclick = () => { card.remove(); updateResultCount(); };
    }
  }

  // ─── 개별 재생성 ───
  async function regenShot(filename, shotId) {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) return alert('API 키를 먼저 설정해주세요.');

    const shot = SHOT_DEFS.find(s => s.id === shotId);
    if (!shot) return;

    const model = uploadedModels.find(m => m.filename === filename);
    const originalName = model ? model.originalName : filename;

    // 섹션이 없으면 생성
    let section = document.getElementById(`person-section-${CSS.escape(filename)}`);
    if (!section) {
      section = getOrCreatePersonSection(filename, originalName, model?.url || null, false);
    }

    const grid = section.querySelector('.results-grid');
    let card = document.getElementById(`card-${CSS.escape(filename)}-${shotId}`);
    if (!card) {
      card = createLoadingCard(filename, shot);
      grid.insertBefore(card, grid.firstChild);
    }

    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();

    generatedImages = generatedImages.filter(i => !(i.filename === filename && i.shotId === shotId));
    updateCard(filename, shotId, 'loading');

    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    statusBar.classList.add('visible');
    statusText.textContent = `${shot.emoji} ${shot.name} 재생성 중...`;

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filenames: [filename], apiKey, selectedShots: [shotId] }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { handleEvent(JSON.parse(line.slice(6)), statusText); } catch {}
          }
        }
      }
    } catch (err) {
      statusText.textContent = `❌ 오류: ${err.message}`;
      updateCard(filename, shotId, 'error', null, null, err.message);
    } finally {
      setTimeout(() => statusBar.classList.remove('visible'), 3000);
      updateResultCount();
    }
  }

  // ─── Actions ───
  function downloadImage(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'generated.png';
    a.click();
  }

  async function downloadPerson(filename) {
    const section = document.getElementById(`person-section-${CSS.escape(filename)}`);
    if (!section) return;
    const imgs = [...section.querySelectorAll('.card-image img')];
    for (const img of imgs) {
      const src = img.getAttribute('src');
      downloadImage(src, src.split('/').pop());
      await new Promise(r => setTimeout(r, 300));
    }
  }

  async function downloadAll() {
    const allImages = [...document.querySelectorAll('.card-image img')];
    for (const img of allImages) {
      const src = img.getAttribute('src');
      const filename = src.split('/').pop();
      downloadImage(src, filename);
      await new Promise(r => setTimeout(r, 300));
    }
  }

  function openImage(url) { window.open(url, '_blank'); }

  function updateResultCount() {
    const cards = document.querySelectorAll('.result-card').length;
    document.getElementById('resultCount').textContent = cards > 0 ? `(${cards})` : '';
    if (document.querySelectorAll('.card-image img').length > 0) {
      document.getElementById('downloadAllBtn').disabled = false;
    }
    // 모든 person-section의 배지 갱신
    document.querySelectorAll('.person-section').forEach(sec => {
      const ef = sec.id.replace('person-section-', '');
      const count = sec.querySelectorAll('.card-image img').length;
      const badgeEl = sec.querySelector(`#badge-${ef}`);
      if (badgeEl) badgeEl.textContent = `${count}개`;
      const dlBtn = sec.querySelector(`#person-dl-${ef}`);
      if (dlBtn) dlBtn.disabled = count === 0;
    });
  }

  // ─── Start ───
  init();
</script>
</body>
</html>
